<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폴짝 미션</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    }

    /* ── 카메라 레이어 ── */
    #camVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
    }

    #camFallback {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      z-index: 0;
    }

    /* ── UI 레이어 ── */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* ── 미션 카드 ── */
    .mission-card {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 420px);
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px) saturate(1.5);
      -webkit-backdrop-filter: blur(18px) saturate(1.5);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 24px;
      padding: 20px 24px 18px;
      text-align: center;
      pointer-events: all;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .mission-badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .friend-badge {
      display: inline-block;
      background: rgba(255,220,50,0.35);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255,220,50,0.6);
    }
    .mission-card.friend-mission {
      background: linear-gradient(135deg, #f7971e, #ffd200);
    }

    .mission-emoji {
      font-size: 3rem;
      display: block;
      line-height: 1;
      margin-bottom: 8px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    .mission-name {
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .mission-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }

    /* ── 진행 바 ── */
    .progress-bar-wrap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: rgba(255,255,255,0.2);
      z-index: 20;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      transition: width 0.5s ease;
    }

    .progress-label {
      position: absolute;
      top: 12px;
      right: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      font-weight: 600;
      pointer-events: none;
    }

    /* ── 성공 버튼 ── */
    .btn-success {
      position: absolute;
      bottom: 48px;
      right: 36px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      font-size: 0.95rem;
      font-weight: 800;
      border: 3px solid rgba(255,255,255,0.5);
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 8px 32px rgba(16,185,129,0.5), 0 0 0 0 rgba(52,211,153,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: pulse 2s infinite;
      z-index: 11;
    }

    .btn-success:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(16,185,129,0.65), 0 0 0 8px rgba(52,211,153,0.2);
    }

    .btn-success:active {
      transform: scale(0.95);
      animation: none;
    }

    .btn-success-icon { font-size: 1.6rem; line-height: 1; }
    .btn-success-text { font-size: 0.8rem; font-weight: 700; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(16,185,129,0.5), 0 0 0 0 rgba(52,211,153,0.4); }
      50% { box-shadow: 0 8px 32px rgba(16,185,129,0.5), 0 0 0 12px rgba(52,211,153,0); }
    }

    /* ── 감지 링 (성공 버튼 둘레) ── */
    #detectRingWrap {
      position: absolute;
      bottom: 43px;
      right: 31px;
      width: 100px;
      height: 100px;
      pointer-events: none;
      z-index: 10;
    }

    #detectRingWrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    /* ── 감지 상태 표시 ── */
    #detectStatus {
      position: absolute;
      bottom: 152px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.88);
      font-size: 0.68rem;
      font-weight: 600;
      padding: 5px 13px;
      border-radius: 99px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }

    /* ── 성공 플래시 ── */
    #successFlash {
      position: fixed;
      inset: 0;
      background: rgba(52, 211, 153, 0.35);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #successFlash.show { opacity: 1; }

    /* ── 시작 화면 ── */
    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
    }

    #startScreen.hidden { display: none; }

    .start-card {
      background: white;
      border-radius: 28px;
      padding: 48px 40px 36px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      max-width: 360px;
      width: 90vw;
    }

    .start-emoji { font-size: 4.5rem; display: block; margin-bottom: 16px; }
    .start-title { font-size: 2rem; font-weight: 900; color: #1e293b; margin-bottom: 8px; }
    .start-desc { font-size: 1rem; color: #64748b; line-height: 1.6; margin-bottom: 24px; }

    .btn-start {
      padding: 18px 48px;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(16,185,129,0.4);
      transition: transform 0.2s;
    }

    .btn-start:hover { transform: translateY(-2px); }

    .ai-status {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .ai-status.ready { color: #10b981; font-weight: 600; }
    .ai-status.error { color: #ef4444; }

    /* ── 완료 화면 ── */
    #completeScreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    #completeScreen.show { display: flex; }

    .complete-card {
      background: white;
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      max-width: 360px;
      width: 90vw;
    }

    .complete-emoji { font-size: 4.5rem; display: block; margin-bottom: 16px; }
    .complete-title { font-size: 2rem; font-weight: 900; color: #1e293b; margin-bottom: 8px; }
    .complete-desc { font-size: 1rem; color: #64748b; line-height: 1.6; margin-bottom: 28px; }

    .btn-restart {
      padding: 16px 40px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
      transition: transform 0.2s;
    }

    .btn-restart:hover { transform: translateY(-2px); }

    /* ── LIVE 뱃지 ── */
    .live-badge {
      position: absolute;
      top: 14px;
      left: 16px;
      background: rgba(239,68,68,0.85);
      color: white;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: none;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: white;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── 카드 전환 애니메이션 ── */
    @keyframes slideDown {
      0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .mission-card.animate {
      animation: slideDown 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 40;
    }

    /* ── 포즈 스켈레톤 캔버스 ── */
    #poseCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* 비디오와 동일하게 미러 */
      z-index: 1;
      pointer-events: none;
    }

    /* ── 디버그 오버레이 캔버스 (미러 없음) ── */
    #debugCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* ── 스켈레톤 토글 버튼 ── */
    #skeletonToggle {
      position: absolute;
      bottom: 48px;
      left: 36px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      pointer-events: all;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #skeletonToggle:hover { background: rgba(0,0,0,0.75); }
    #skeletonToggle.off { opacity: 0.4; }
  </style>
</head>
<body>

  <!-- 카메라 레이어 -->
  <div id="camFallback"></div>
  <video id="camVideo" autoplay playsinline></video>

  <!-- 포즈 스켈레톤 캔버스 (미러) -->
  <canvas id="poseCanvas"></canvas>
  <!-- 디버그 오버레이 캔버스 (미러 없음) -->
  <canvas id="debugCanvas"></canvas>

  <!-- 성공 플래시 -->
  <div id="successFlash"></div>

  <!-- UI 레이어 -->
  <div id="ui">
    <!-- 진행바 -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 30</div>

    <!-- LIVE 뱃지 -->
    <div class="live-badge" id="liveBadge" style="display:none">
      <span class="live-dot"></span> LIVE
    </div>

    <!-- 미션 카드 -->
    <div class="mission-card" id="missionCard">
      <div class="mission-badge" id="missionBadge">미션 1 / 15</div>
      <div class="friend-badge" id="friendBadge" style="display:none">👫 친구랑 함께!</div>
      <span class="mission-emoji" id="missionEmoji"></span>
      <div class="mission-name" id="missionName"></div>
      <div class="mission-desc" id="missionDesc"></div>
    </div>

    <!-- 감지 링 (버튼 뒤) -->
    <div id="detectRingWrap">
      <svg viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
        <circle id="detectRing" cx="55" cy="55" r="50"
          fill="none" stroke="#34d399" stroke-width="6"
          stroke-dasharray="314" stroke-dashoffset="314"
          stroke-linecap="round"
          style="transition: stroke-dashoffset 0.12s linear"/>
      </svg>
    </div>

    <!-- 감지 상태 라벨 -->
    <div id="detectStatus">🔍 동작 감지중</div>

    <!-- 스켈레톤 토글 버튼 -->
    <button id="skeletonToggle" onclick="toggleSkeleton()" title="스켈레톤 표시/숨기기">🦴</button>

    <!-- 성공 버튼 -->
    <button class="btn-success" onclick="onSuccess()">
      <span class="btn-success-icon">✅</span>
      <span class="btn-success-text">성공!</span>
    </button>
  </div>

  <!-- 시작 화면 -->
  <div id="startScreen">
    <div class="start-card">
      <span class="start-emoji">🏃</span>
      <div class="start-title">폴짝 미션!</div>
      <div class="start-desc">15가지 재미있는 동작 미션에<br>도전해 보아요! 준비되셨나요? 💪</div>
      <button class="btn-start" onclick="startGame()">🚀 시작하기!</button>
      <div id="aiStatus" class="ai-status">🔄 AI 로딩중... (로딩 전에도 시작 가능)</div>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div id="completeScreen">
    <div class="complete-card">
      <span class="complete-emoji">🏆</span>
      <div class="complete-title">모두 완료!</div>
      <div class="complete-desc">15개 미션을 전부 해냈어요!<br>정말 대단해요! 👏</div>
      <button class="btn-restart" onclick="restart()">🔄 다시 시작</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════
    //  미션 데이터
    // ══════════════════════════════════════════
    const missions = [
      // ── 혼자 하는 미션 10 ──
      { emoji: "🦩", name: "한 발로 폴짝폴짝", desc: "한 발로 제자리에서 5번 뛰어보아요!", detect: "one_leg" },
      { emoji: "🐸", name: "개구리 점프", desc: "쭈그려 앉았다가 높이 점프!", detect: "squat" },
      { emoji: "🦘", name: "캥거루 뛰기", desc: "두 발을 모아서 앞으로 3번 뛰어가요!", detect: "jump" },
      { emoji: "🦋", name: "나비 팔 흔들기", desc: "팔을 날개처럼 펼치고 나비처럼 흔들어요!", detect: "arms_wide" },
      { emoji: "🐘", name: "코끼리 코 흔들기", desc: "두 팔을 늘어뜨리고 코처럼 흔들어요!", detect: "arm_wave" },
      { emoji: "🦁", name: "사자 포효", desc: "두 팔을 높이 들고 어흥! 점프!", detect: "arms_up" },
      { emoji: "⭐", name: "별 모양 점프", desc: "점프하며 팔다리를 크게 벌려요!", detect: "star_jump" },
      { emoji: "🌀", name: "팽이 돌기", desc: "제자리에서 5바퀴 빙글빙글!", detect: "spin" },
      { emoji: "🌊", name: "파도 움직이기", desc: "팔을 물결처럼 부드럽게 흔들어요!", detect: "arm_wave" },
      { emoji: "🎊", name: "축하 댄스", desc: "자유롭게 마음껏 춤춰요! 파이팅!", detect: "dance" },
      // ── 친구랑 함께 하는 미션 5 ──
      { emoji: "👯", name: "쌍둥이 점프", desc: "친구랑 손 잡고 동시에 폴짝폴짝!", detect: "jump", friend: true },
      { emoji: "🤝", name: "손잡고 빙글빙글", desc: "친구랑 손잡고 함께 빙글빙글 돌아요!", detect: "spin", friend: true },
      { emoji: "🕺", name: "친구랑 댄스 배틀", desc: "친구랑 마주보고 신나게 춤 대결!", detect: "dance", friend: true },
      { emoji: "🚂", name: "기차 행진", desc: "친구 어깨 잡고 한 줄로 무릎 높이 행진!", detect: "high_knee", friend: true },
      { emoji: "🙌", name: "하이파이브 점프", desc: "친구랑 마주보고 점프하며 하이파이브!", detect: "jump", friend: true },
    ];

    // ══════════════════════════════════════════
    //  감지 타입 라벨
    // ══════════════════════════════════════════
    const DETECT_LABELS = {
      jump:         '🦘 점프 감지중',
      one_leg:      '🦩 한 발 들기 감지중',
      arms_wide:    '🦅 팔 벌림 감지중',
      body_low:     '🐊 낮은 자세 감지중',
      squat:        '🐸 쭈그리기 감지중',
      forward_bend: '🤸 앞으로 숙이기 감지중',
      high_knee:    '🎪 무릎 들기 감지중',
      arm_wave:     '🌊 팔 흔들기 감지중',
      spin:         '🌀 회전 감지중',
      arms_up:      '🦁 팔 올리기 감지중',
      wrist_knee:   '🥁 무릎 치기 감지중',
      star_jump:    '⭐ 별 점프 감지중',
      slow_move:    '🐢 움직임 감지중',
      dance:        '🎊 댄스 감지중',
    };

    // ══════════════════════════════════════════
    //  게임 상태
    // ══════════════════════════════════════════
    let currentIndex = 0;
    let completed = 0;
    let gameStarted = false;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function shuffleMissions() {
      const solo   = missions.filter(m => !m.friend);
      const friend = missions.filter(m =>  m.friend);
      shuffle(solo);
      shuffle(friend);
      missions.splice(0, missions.length, ...solo, ...friend);
    }

    function renderMission(animate = false) {
      const m = missions[currentIndex];
      document.getElementById('missionBadge').textContent = `미션 ${currentIndex + 1} / ${missions.length}`;
      document.getElementById('missionEmoji').textContent = m.emoji;
      document.getElementById('missionName').textContent = m.name;
      document.getElementById('missionDesc').textContent = m.desc;

      const friendBadge = document.getElementById('friendBadge');
      if (friendBadge) friendBadge.style.display = m.friend ? 'block' : 'none';
      const card = document.getElementById('missionCard');
      if (m.friend) card.classList.add('friend-mission');
      else card.classList.remove('friend-mission');

      if (animate) {
        const card = document.getElementById('missionCard');
        card.classList.remove('animate');
        void card.offsetWidth;
        card.classList.add('animate');
      }

      // 감지 상태 초기화
      detectionProgress = 0;
      poseHistory.length = 0;
      updateDetectRing(0);

      // 감지 라벨 업데이트
      const label = DETECT_LABELS[m.detect] || '🔍 동작 감지중';
      const el = document.getElementById('detectStatus');
      el.textContent = label;
      el.style.display = poseDetector ? 'block' : 'none';

      speak(`${m.name}. ${m.desc}`);
    }

    // ── TTS ──
    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ko-KR';
      utter.rate = 0.9;
      utter.pitch = 1.1;
      utter.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const femaleKo = voices.find(v =>
        v.lang.startsWith('ko') && /female|woman|여성|yuna|heami|지은|선희/i.test(v.name)
      ) || voices.find(v => v.lang.startsWith('ko'));
      if (femaleKo) utter.voice = femaleKo;
      window.speechSynthesis.speak(utter);
    }

    function updateProgress() {
      const pct = (completed / missions.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${completed} / ${missions.length}`;
    }

    function onSuccess() {
      completed++;
      updateProgress();
      launchConfetti(30);
      flashGreen();
      detectionProgress = 0;
      poseHistory.length = 0;
      updateDetectRing(0);

      currentIndex++;
      if (currentIndex >= missions.length) {
        setTimeout(showComplete, 400);
        return;
      }
      renderMission(true);
    }

    function flashGreen() {
      const el = document.getElementById('successFlash');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 300);
    }

    function showComplete() {
      document.getElementById('completeScreen').classList.add('show');
      document.getElementById('detectStatus').style.display = 'none';
      launchConfetti(100);
    }

    function restart() {
      shuffleMissions();
      currentIndex = 0;
      completed = 0;
      detectionProgress = 0;
      poseHistory.length = 0;
      updateDetectRing(0);
      updateProgress();
      document.getElementById('completeScreen').classList.remove('show');
      renderMission(true);
    }

    function launchConfetti(count = 40) {
      const colors = ['#38bdf8','#818cf8','#34d399','#f472b6','#fbbf24','#f87171'];
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (1.2 + Math.random() * 2) + 's';
        el.style.animationDelay = Math.random() * 0.4 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }
    }

    // ── 카메라 ──
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
          audio: false
        });
        const video = document.getElementById('camVideo');
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = resolve; });
        await video.play();
        document.getElementById('liveBadge').style.display = 'flex';
        document.getElementById('camFallback').style.display = 'none';
      } catch (e) {
        console.warn('카메라 없음:', e);
      }
    }

    function startGame() {
      shuffleMissions();
      gameStarted = true;
      document.getElementById('startScreen').classList.add('hidden');
      renderMission();
      updateProgress();
    }

    // ══════════════════════════════════════════
    //  스켈레톤 시각화
    // ══════════════════════════════════════════

    let showSkeleton = true;

    // 연결할 관절 쌍 [from, to]
    const SKELETON_PAIRS = [
      [0,1],[0,2],[1,3],[2,4],        // 얼굴
      [5,6],                           // 어깨
      [5,7],[7,9],                     // 왼팔
      [6,8],[8,10],                    // 오른팔
      [5,11],[6,12],[11,12],           // 몸통
      [11,13],[13,15],                 // 왼다리
      [12,14],[14,16],                 // 오른다리
    ];

    // 키포인트 색상 (신체 부위별)
    const KP_COLORS = [
      '#f472b6','#f472b6','#f472b6','#f472b6','#f472b6', // 얼굴 (분홍)
      '#38bdf8','#38bdf8',                                 // 어깨 (하늘)
      '#38bdf8','#38bdf8',                                 // 팔꿈치
      '#818cf8','#818cf8',                                 // 손목 (보라)
      '#34d399','#34d399',                                 // 엉덩이 (초록)
      '#34d399','#34d399',                                 // 무릎
      '#fbbf24','#fbbf24',                                 // 발목 (노랑)
    ];

    function drawPose(kps) {
      const canvas = document.getElementById('poseCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      // 캔버스 크기 맞추기 (변경 시만)
      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!kps || !showSkeleton) return;

      const W = canvas.width, H = canvas.height;
      const pt = kp => ({ x: kp.x * W, y: kp.y * H });

      // 뼈대 선 그리기
      for (const [i, j] of SKELETON_PAIRS) {
        const a = kps[i], b = kps[j];
        if (!ok(a) || !ok(b)) continue;
        const pa = pt(a), pb = pt(b);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      // 키포인트 원 그리기
      kps.forEach((kp, i) => {
        if (!ok(kp)) return;
        const p = pt(kp);
        const r = i === 0 ? 7 : 5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = KP_COLORS[i] || '#ffffff';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });

    }

    function drawDebugOverlay() {
      const canvas = document.getElementById('debugCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const d = debugVal;
      if (!d.label) return;

      const W = canvas.width, H = canvas.height;
      const barW = 230, barH = 54;
      const bx = W - barW - 12, by = H - barH - 160; // 성공 버튼 위

      // 배경
      ctx.fillStyle = 'rgba(0,0,0,0.62)';
      ctx.beginPath();
      ctx.roundRect(bx, by, barW, barH, 10);
      ctx.fill();

      // 텍스트
      ctx.fillStyle = 'white';
      ctx.font = 'bold 12px sans-serif';
      ctx.fillText(`${d.label}`, bx + 10, by + 18);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '11px sans-serif';
      ctx.fillText(`측정값 ${d.val}  /  기준 ${d.thr}`, bx + 10, by + 34);

      // 감지 여부
      ctx.fillStyle = d.hit ? '#34d399' : '#f87171';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText(d.hit ? '● 감지됨' : '○ 미감지', bx + barW - 68, by + 18);

      // 게이지 배경
      const gx = bx + 10, gy = by + 40, gw = barW - 20, gh = 8;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.roundRect(gx, gy, gw, gh, 4); ctx.fill();

      // 게이지 채우기
      const ratio = d.thr > 0 ? Math.min(1, d.val / (d.thr * 1.2)) : 0;
      ctx.fillStyle = d.hit ? '#34d399' : '#f87171';
      ctx.beginPath(); ctx.roundRect(gx, gy, gw * ratio, gh, 4); ctx.fill();
    }

    function toggleSkeleton() {
      showSkeleton = !showSkeleton;
      const btn = document.getElementById('skeletonToggle');
      btn.classList.toggle('off', !showSkeleton);
      if (!showSkeleton) {
        // 캔버스 지우기
        const canvas = document.getElementById('poseCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    // ══════════════════════════════════════════
    //  포즈 감지 (MoveNet)
    // ══════════════════════════════════════════

    let poseDetector = null;
    let detectionProgress = 0;
    const PROGRESS_INC = 4;    // 감지됐을 때 증가
    const PROGRESS_DEC = 0.3;  // 미감지 시 감소 (천천히 — 잠깐 끊겨도 링 유지)
    const PROGRESS_MAX = 100;
    const HISTORY_LEN = 30;
    const poseHistory = [];    // 정규화된 keypoint 배열

    // MoveNet keypoint 인덱스
    const KP = {
      nose: 0,
      lShoulder: 5, rShoulder: 6,
      lElbow: 7, rElbow: 8,
      lWrist: 9, rWrist: 10,
      lHip: 11, rHip: 12,
      lKnee: 13, rKnee: 14,
      lAnkle: 15, rAnkle: 16,
    };

    function mid(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
    function dst(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function ok(kp) { return kp && kp.score >= 0.15; }  // 신뢰도 기준 완화
    function variance(arr) {
      if (arr.length < 2) return 0;
      const m = arr.reduce((s, v) => s + v, 0) / arr.length;
      return arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length;
    }

    // ── 세로 기준: 어깨-hip 수직 거리 ──
    function bs(kps) {
      const ls = kps[KP.lShoulder], rs = kps[KP.rShoulder];
      const lh = kps[KP.lHip],     rh = kps[KP.rHip];
      if (!ok(ls) || !ok(rs) || !ok(lh) || !ok(rh)) return 0.18;
      return Math.max(0.08, ((lh.y + rh.y) - (ls.y + rs.y)) / 2);
    }

    // ── 가로 기준: 어깨 너비 (팔 벌림 등 수평 측정용) ──
    function bw(kps) {
      const ls = kps[KP.lShoulder], rs = kps[KP.rShoulder];
      if (!ok(ls) || !ok(rs)) return 0.12;
      return Math.max(0.06, Math.abs(ls.x - rs.x));
    }

    // 마지막 감지 값 (캔버스 디버그 표시용)
    let debugVal = { val: 0, thr: 0, label: '' };

    // 감지 함수
    function detectGesture(type, kps) {
      const ls = kps[KP.lShoulder], rs = kps[KP.rShoulder];
      const le = kps[KP.lElbow],   re = kps[KP.rElbow];
      const lw = kps[KP.lWrist],   rw = kps[KP.rWrist];
      const lh = kps[KP.lHip],     rh = kps[KP.rHip];
      const lk = kps[KP.lKnee],    rk = kps[KP.rKnee];
      const la = kps[KP.lAnkle],   ra = kps[KP.rAnkle];
      const nose = kps[KP.nose];

      const hipMid      = ok(lh) && ok(rh) ? mid(lh, rh) : null;
      const shoulderMid = ok(ls) && ok(rs) ? mid(ls, rs) : null;
      const vScale = bs(kps); // 세로 기준 (어깨-hip)
      const hScale = bw(kps); // 가로 기준 (어깨 너비)

      let val = 0, thr = 0, result = 0;

      switch (type) {

        case 'jump': {
          if (!hipMid || poseHistory.length < 6) break;
          const ys = poseHistory.slice(-12).map(h => {
            const a = h[KP.lHip], b = h[KP.rHip];
            return ok(a) && ok(b) ? (a.y + b.y) / 2 : null;
          }).filter(v => v !== null);
          if (ys.length < 5) break;
          val = Math.max(...ys) - Math.min(...ys);
          thr = vScale * 0.20;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'one_leg': {
          if (!ok(la) || !ok(ra)) break;
          val = Math.abs(la.y - ra.y);
          thr = vScale * 0.7;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'arms_wide': {
          // 손목 우선, 없으면 팔꿈치로 대체 (엣지에서 손목 신뢰도 낮을 때)
          const lArm = ok(lw) ? lw : (ok(le) ? le : null);
          const rArm = ok(rw) ? rw : (ok(re) ? re : null);
          if (!lArm || !rArm) break;
          val = Math.abs(lArm.x - rArm.x); // 수평 간격만 측정
          thr = hScale * 2.2;              // 어깨 너비의 2.2배
          result = val > thr ? 1 : 0;
          break;
        }

        case 'body_low': {
          if (!hipMid || !shoulderMid) break;
          val = hipMid.y - shoulderMid.y;
          thr = vScale * 2.6;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'squat': {
          if (!hipMid || !ok(lk) || !ok(rk)) break;
          const kneeY = (lk.y + rk.y) / 2;
          val = Math.abs(hipMid.y - kneeY);
          thr = vScale * 0.65;
          result = val < thr ? 1 : 0; // 작을수록 쭈그린 자세
          break;
        }

        case 'forward_bend': {
          if (!shoulderMid || !ok(lk) || !ok(rk)) break;
          const kneeY = (lk.y + rk.y) / 2;
          val = kneeY - shoulderMid.y;
          thr = vScale * 1.3;
          result = val < thr ? 1 : 0;
          break;
        }

        case 'high_knee': {
          if (!ok(lk) || !ok(rk) || !ok(la) || !ok(ra)) break;
          const ankleY = (la.y + ra.y) / 2;
          val = Math.max(ankleY - lk.y, ankleY - rk.y);
          thr = vScale * 0.35;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'arm_wave': {
          if (poseHistory.length < 8) break;
          const lwYs = poseHistory.map(h => ok(h[KP.lWrist]) ? h[KP.lWrist].y : null).filter(v => v !== null);
          const rwYs = poseHistory.map(h => ok(h[KP.rWrist]) ? h[KP.rWrist].y : null).filter(v => v !== null);
          val = Math.max(variance(lwYs), variance(rwYs));
          thr = 0.0008;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'spin': {
          if (poseHistory.length < 8) break;
          const xs = poseHistory.map(h => {
            const a = h[KP.lShoulder], b = h[KP.rShoulder];
            return ok(a) && ok(b) ? (a.x + b.x) / 2 : null;
          }).filter(v => v !== null);
          if (xs.length < 6) break;
          val = Math.max(...xs) - Math.min(...xs);
          thr = hScale * 0.8;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'arms_up': {
          if (!shoulderMid || !ok(lw) || !ok(rw)) break;
          val = shoulderMid.y - Math.min(lw.y, rw.y); // 손목이 어깨보다 얼마나 높은지
          thr = vScale * 0.15;
          result = (lw.y < shoulderMid.y - thr && rw.y < shoulderMid.y - thr) ? 1 : 0;
          break;
        }

        case 'wrist_knee': {
          if (!ok(lk) || !ok(rk)) break;
          const lArm2 = ok(lw) ? lw : (ok(le) ? le : null);
          const rArm2 = ok(rw) ? rw : (ok(re) ? re : null);
          if (!lArm2 || !rArm2) break;
          val = Math.min(dst(lArm2, lk), dst(rArm2, rk));
          thr = vScale * 0.9;
          result = val < thr ? 1 : 0;
          break;
        }

        case 'star_jump': {
          result = (detectGesture('jump', kps) || detectGesture('arms_wide', kps)) ? 1 : 0;
          val = result; thr = 1;
          break;
        }

        case 'slow_move': {
          if (poseHistory.length < 5) break;
          const noseXs = poseHistory.map(h => ok(h[KP.nose]) ? h[KP.nose].x : null).filter(v => v !== null);
          const hipYs2 = poseHistory.map(h => {
            const a = h[KP.lHip], b = h[KP.rHip];
            return ok(a) && ok(b) ? (a.y + b.y) / 2 : null;
          }).filter(v => v !== null);
          if (noseXs.length < 4) break;
          val = Math.max(
            Math.max(...noseXs) - Math.min(...noseXs),
            Math.max(...hipYs2) - Math.min(...hipYs2)
          );
          thr = 0.006;
          result = val > thr ? 1 : 0;
          break;
        }

        case 'dance': {
          if (poseHistory.length < 8) break;
          const hxs = poseHistory.map(h => {
            const a = h[KP.lHip], b = h[KP.rHip];
            return ok(a) && ok(b) ? (a.x + b.x) / 2 : null;
          }).filter(v => v !== null);
          const hys = poseHistory.map(h => {
            const a = h[KP.lHip], b = h[KP.rHip];
            return ok(a) && ok(b) ? (a.y + b.y) / 2 : null;
          }).filter(v => v !== null);
          if (hxs.length < 6) break;
          val = Math.max(
            Math.max(...hxs) - Math.min(...hxs),
            Math.max(...hys) - Math.min(...hys)
          );
          thr = hScale * 0.15;
          result = val > thr ? 1 : 0;
          break;
        }

        default:
          break;
      }

      // 디버그 정보 저장 (캔버스 오버레이용)
      debugVal = { val: +val.toFixed(3), thr: +thr.toFixed(3), label: type, hit: result === 1 };
      return result;
    }

    // 감지 링 업데이트 (progress: 0~100)
    function updateDetectRing(progress) {
      const circumference = 314;
      const offset = circumference * (1 - progress / PROGRESS_MAX);
      document.getElementById('detectRing').style.strokeDashoffset = offset;
    }

    // 메인 포즈 감지 루프
    async function poseLoop() {
      const video = document.getElementById('camVideo');
      if (poseDetector && gameStarted && video.readyState >= 2 && video.videoWidth > 0) {
        try {
          const poses = await poseDetector.estimatePoses(video);
          if (poses.length > 0) {
            // 정규화된 keypoint 배열 생성
            const kps = poses[0].keypoints.map(kp => ({
              x: kp.x / video.videoWidth,
              y: kp.y / video.videoHeight,
              score: kp.score,
            }));

            // 스켈레톤 + 디버그 오버레이 그리기
            drawPose(kps);
            drawDebugOverlay();

            // 히스토리 관리
            poseHistory.push(kps);
            if (poseHistory.length > HISTORY_LEN) poseHistory.shift();

            // 현재 미션 감지 타입
            const detectType = missions[currentIndex]?.detect || 'dance';
            const detected = detectGesture(detectType, kps);

            if (detected) {
              detectionProgress = Math.min(PROGRESS_MAX, detectionProgress + PROGRESS_INC);
            } else {
              detectionProgress = Math.max(0, detectionProgress - PROGRESS_DEC);
            }

            updateDetectRing(detectionProgress);

            // 진행도가 가득 차면 자동 성공
            if (detectionProgress >= PROGRESS_MAX) {
              detectionProgress = 0;
              poseHistory.length = 0;
              onSuccess();
            }
          }
        } catch (e) {
          // pose 감지 오류는 조용히 무시
        }
      }
      // ~15fps
      setTimeout(() => requestAnimationFrame(poseLoop), 66);
    }

    // 스크립트 동적 로드 헬퍼
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // MoveNet 모델 로드 (페이지 블로킹 없이 백그라운드 로드)
    async function loadPoseDetector() {
      const statusEl = document.getElementById('aiStatus');

      // 20초 타임아웃
      const timer = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout')), 20000)
      );

      try {
        await Promise.race([
          (async () => {
            // CDN 스크립트 동적 로드 (게임 진행과 독립적)
            await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');

            // webgl 실패 시 cpu로 폴백
            for (const backend of ['webgl', 'cpu']) {
              try {
                await tf.setBackend(backend);
                await tf.ready();
                break;
              } catch (_) { /* 다음 backend 시도 */ }
            }

            poseDetector = await poseDetection.createDetector(
              poseDetection.SupportedModels.MoveNet,
              { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
            );
          })(),
          timer
        ]);

        statusEl.textContent = '✅ AI 동작 감지 준비 완료!';
        statusEl.classList.add('ready');
        requestAnimationFrame(poseLoop);
      } catch (e) {
        console.warn('Pose detector 로드 실패:', e);
        statusEl.textContent = '⚠️ AI 감지 불가 (버튼으로 성공 확인)';
        statusEl.classList.add('error');
      }
    }

    // ── 초기화 ──
    startCamera();
    loadPoseDetector();
  </script>
</body>
</html>
